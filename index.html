<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="theme-color"
        content="#071525"
    >

    <title>yuuka_no_dentaku</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="style.css"
    >
</head>

<body>

    <div
        class="background-grid"
        aria-hidden="true"
    ></div>

    <main class="app-shell">

        <section
            class="calculator"
            aria-label="yuuka_no_dentaku"
        >

            <!-- 上側フレーム -->
            <div
                class="armor armor-top-left"
                aria-hidden="true"
            ></div>

            <div
                class="armor armor-top-right"
                aria-hidden="true"
            ></div>

            <div
                class="top-light"
                aria-hidden="true"
            ></div>

            <!-- 数字表示 -->
            <header class="display-area">

                <div class="display-header">

                    <span class="status-dot"></span>

                    <span class="device-name">
                        YUUKA_NO_DENTAKU
                    </span>

                </div>

                <div
                    id="display"
                    class="display-value"
                    aria-live="polite"
                >
                    0
                </div>

            </header>

            <!-- 上の4ボタン -->
            <div class="utility-buttons">

                <button
                    class="utility-key utility-clear"
                    type="button"
                    data-action="clear"
                    aria-label="クリア"
                >
                    C
                </button>

                <button
                    class="utility-key"
                    type="button"
                    data-action="backspace"
                    aria-label="一文字削除"
                >
                    ⌫
                </button>

                <button
                    class="utility-key"
                    type="button"
                    data-action="percent"
                    aria-label="パーセント"
                >
                    %
                </button>

                <button
                    class="utility-key"
                    type="button"
                    data-action="sign"
                    aria-label="正負切り替え"
                >
                    ±
                </button>

            </div>

            <!-- メイン操作部 -->
            <div class="main-controls">

                <div class="number-cluster">

                    <button
                        class="number-key key-1"
                        type="button"
                        data-number="1"
                    >
                        <span>1</span>
                    </button>

                    <button
                        class="number-key key-2"
                        type="button"
                        data-number="2"
                    >
                        <span>2</span>
                    </button>

                    <button
                        class="number-key key-3"
                        type="button"
                        data-number="3"
                    >
                        <span>3</span>
                    </button>

                    <button
                        class="number-key key-4"
                        type="button"
                        data-number="4"
                    >
                        <span>4</span>
                    </button>

                    <button
                        class="number-key key-5"
                        type="button"
                        data-number="5"
                    >
                        <span>5</span>
                    </button>

                    <button
                        class="number-key key-6"
                        type="button"
                        data-number="6"
                    >
                        <span>6</span>
                    </button>

                    <button
                        class="number-key key-7"
                        type="button"
                        data-number="7"
                    >
                        <span>7</span>
                    </button>

                    <button
                        class="number-key key-8"
                        type="button"
                        data-number="8"
                    >
                        <span>8</span>
                    </button>

                    <button
                        class="number-key key-9"
                        type="button"
                        data-number="9"
                    >
                        <span>9</span>
                    </button>

                </div>

                <!-- 白い0ボタン -->
                <button
                    class="zero-key"
                    type="button"
                    data-number="0"
                    aria-label="0"
                >
                    <span>0</span>
                </button>

                <!-- 右下の演算ボタン -->
                <div class="operator-pad">

                    <button
                        class="operator-key"
                        type="button"
                        data-action="operator"
                        data-value="/"
                        aria-label="割り算"
                    >
                        ÷
                    </button>

                    <button
                        class="operator-key"
                        type="button"
                        data-action="operator"
                        data-value="*"
                        aria-label="掛け算"
                    >
                        ×
                    </button>

                    <button
                        class="operator-key"
                        type="button"
                        data-action="operator"
                        data-value="-"
                        aria-label="引き算"
                    >
                        −
                    </button>

                    <button
                        class="operator-key"
                        type="button"
                        data-action="operator"
                        data-value="+"
                        aria-label="足し算"
                    >
                        ＋
                    </button>

                    <button
                        class="operator-key"
                        type="button"
                        data-number="."
                        aria-label="小数点"
                    >
                        .
                    </button>

                    <button
                        class="operator-key equal-key"
                        type="button"
                        data-action="equal"
                        aria-label="計算結果"
                    >
                        =
                    </button>

                </div>

            </div>

            <!-- 下側フレーム -->
            <div
                class="armor armor-bottom-left"
                aria-hidden="true"
            ></div>

            <div
                class="armor armor-bottom-right"
                aria-hidden="true"
            ></div>

            <div
                class="bottom-light"
                aria-hidden="true"
            ></div>

        </section>

    </main>

    <canvas
        id="particles"
        aria-hidden="true"
    ></canvas>

    <script src="script.js"></script>

</body>
</html>
