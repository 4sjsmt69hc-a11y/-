<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="theme-color"
        content="#061321"
    >

    <title>yuuka_no_dentaku</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- キャッシュ回避 -->
    <link
        rel="stylesheet"
        href="style.css?v=20260711-1"
    >
</head>

<body>

    <!-- 背景グリッド -->
    <div
        class="background-grid"
        aria-hidden="true"
    ></div>

    <main class="app-shell">

        <section
            class="calculator"
            aria-label="ユウカの関数電卓"
        >

            <!-- 上フレーム -->
            <div
                class="device-frame frame-top"
                aria-hidden="true"
            >
                <div class="frame-center"></div>
                <div class="frame-end frame-end-left"></div>
                <div class="frame-end frame-end-right"></div>
                <div class="frame-light"></div>
            </div>

            <!-- 上部右側の水色装飾 -->
            <div
                class="cyan-module"
                aria-hidden="true"
            ></div>

            <!-- 左上の白丸装飾 -->
            <div
                class="white-decoration white-decoration-top"
                aria-hidden="true"
            ></div>

            <!-- 計算表示 -->
            <header class="display-area">

                <div
                    id="display"
                    class="display-value"
                    aria-live="polite"
                    aria-atomic="true"
                >
                    0
                </div>

            </header>

            <!-- 上部の銀ボタン -->
            <div
                class="utility-buttons"
                aria-label="補助操作"
            >

                <button
                    class="utility-key utility-key-clear"
                    type="button"
                    data-action="clear"
                    aria-label="クリア"
                >
                    <span>C</span>
                </button>

                <button
                    class="utility-key utility-key-backspace"
                    type="button"
                    data-action="backspace"
                    aria-label="一文字削除"
                >
                    <span>⌫</span>
                </button>

                <div
                    class="utility-gap"
                    aria-hidden="true"
                ></div>

                <button
                    class="utility-key utility-key-percent"
                    type="button"
                    data-action="percent"
                    aria-label="パーセント"
                >
                    <span>%</span>
                </button>

                <button
                    class="utility-key utility-key-sign"
                    type="button"
                    data-action="sign"
                    aria-label="正負切り替え"
                >
                    <span>±</span>
                </button>

            </div>

            <!-- 下半分の操作部分 -->
            <div class="main-controls">

                <!-- 数字ボタン -->
                <div
                    class="number-cluster"
                    aria-label="数字入力"
                >

                    <button class="number-key key-1" type="button" data-number="1"><span>1</span></button>
                    <button class="number-key key-2" type="button" data-number="2"><span>2</span></button>
                    <button class="number-key key-3" type="button" data-number="3"><span>3</span></button>
                    <button class="number-key key-4" type="button" data-number="4"><span>4</span></button>
                    <button class="number-key key-5" type="button" data-number="5"><span>5</span></button>
                    <button class="number-key key-6" type="button" data-number="6"><span>6</span></button>
                    <button class="number-key key-7" type="button" data-number="7"><span>7</span></button>
                    <button class="number-key key-8" type="button" data-number="8"><span>8</span></button>
                    <button class="number-key key-9" type="button" data-number="9"><span>9</span></button>

                </div>

                <!-- 左下の0 -->
                <button
                    class="zero-key"
                    type="button"
                    data-number="0"
                >
                    <span>0</span>
                </button>

                <!-- 演算ボタン -->
                <div class="operator-cluster">

                    <button class="operator-key operator-divide" data-action="operator" data-value="/">÷</button>

                    <button class="operator-key operator-multiply" data-action="operator" data-value="*">×</button>

                    <button class="operator-key operator-minus" data-action="operator" data-value="-">−</button>

                    <button class="operator-key operator-plus" data-action="operator" data-value="+">＋</button>

                    <button class="operator-key operator-decimal" data-number=".">.</button>

                    <button class="operator-key operator-equal" data-action="equal">=</button>

                </div>

            </div>

            <!-- 下フレーム -->
            <div
                class="device-frame frame-bottom"
                aria-hidden="true"
            >
                <div class="frame-center"></div>
                <div class="frame-end frame-end-left"></div>
                <div class="frame-end frame-end-right"></div>
                <div class="frame-light"></div>
            </div>

        </section>

    </main>

    <canvas
        id="particles"
        aria-hidden="true"
    ></canvas>

    <script src="script.js"></script>

</body>
</html>
