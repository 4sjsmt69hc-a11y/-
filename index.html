<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Yuuka Calculator</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <div class="background-grid"></div>

    <main class="calculator">

        <!-- 上フレーム -->
        <div class="frame frame-top">

            <div class="frame-light"></div>

        </div>

        <!-- 本体 -->

        <div class="body-panel">

            <div class="white-dot"></div>

            <div class="cyan-corner"></div>

            <div class="display">

                <div id="display">0</div>

            </div>

            <!-- 上ボタン -->

            <div class="utility-buttons">

                <button
                    class="utility-key"
                    data-action="clear"
                >
                    C
                </button>

                <button
                    class="utility-key"
                    data-action="backspace"
                >
                    ⌫
                </button>

                <button
                    class="utility-key"
                    data-action="percent"
                >
                    %
                </button>

                <button
                    class="utility-key"
                    data-action="sign"
                >
                    ±
                </button>

            </div>

            <!-- 数字 -->

            <div class="number-area">

                <button class="number-key n1" data-number="1">1</button>

                <button class="number-key n2" data-number="2">2</button>

                <button class="number-key n3" data-number="3">3</button>

                <button class="number-key n4" data-number="4">4</button>

                <button class="number-key n5" data-number="5">5</button>

                <button class="number-key n6" data-number="6">6</button>

                <button class="number-key n7" data-number="7">7</button>

                <button class="number-key n8" data-number="8">8</button>

                <button class="number-key n9" data-number="9">9</button>

            </div>

            <!-- 演算 -->

            <div class="operator-area">

                <button
                    class="operator-key divide"
                    data-action="operator"
                    data-value="/"
                >
                    ÷
                </button>

                <button
                    class="operator-key multiply"
                    data-action="operator"
                    data-value="*"
                >
                    ×
                </button>

                <button
                    class="operator-key minus"
                    data-action="operator"
                    data-value="-"
                >
                    −
                </button>

                <button
                    class="operator-key plus"
                    data-action="operator"
                    data-value="+"
                >
                    ＋
                </button>

                <button
                    class="operator-key decimal"
                    data-number="."
                >
                    .
                </button>

                <button
                    class="operator-key equal"
                    data-action="equal"
                >
                    =
                </button>

            </div>

            <!-- 0 -->

            <button
                class="zero-key"
                data-number="0"
            >
                0
            </button>

        </div>

        <!-- 下フレーム -->

        <div class="frame frame-bottom">

            <div class="frame-light"></div>

        </div>

    </main>

    <canvas id="particles"></canvas>

    <script src="script.js"></script>

</body>

</html>
