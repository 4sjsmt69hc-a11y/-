<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="calculator" aria-label="電卓">
      <div class="top-panel">
        <div class="speaker-holes" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

        <div class="display-wrap">
          <div id="expression" class="expression" aria-live="polite"></div>
          <output id="display" class="display">0</output>
        </div>
      </div>

      <div class="keypad">
        <button class="key utility" data-action="clear">AC</button>
        <button class="key utility" data-action="delete">DEL</button>
        <button class="key utility" data-action="percent">%</button>

        <button class="key number" data-value="7">7</button>
        <button class="key number" data-value="8">8</button>
        <button class="key number" data-value="9">9</button>

        <button class="key number" data-value="4">4</button>
        <button class="key number" data-value="5">5</button>
        <button class="key number" data-value="6">6</button>

        <button class="key number" data-value="1">1</button>
        <button class="key number" data-value="2">2</button>
        <button class="key number" data-value="3">3</button>

        <button class="key number zero" data-value="0">0</button>

        <button class="key operator op-divide" data-operator="÷">÷</button>
        <button class="key operator op-multiply" data-operator="×">×</button>
        <button class="key operator op-minus" data-operator="−">−</button>
        <button class="key operator op-plus" data-operator="+">＋</button>

        <button class="key decimal" data-action="decimal">.</button>
        <button class="key equals" data-action="equals">＝</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
