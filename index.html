<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="theme-color"
        content="#061626"
    >

    <title>Yuuka Calculator</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="style.css?v=20260713-layout01"
    >
</head>

<body>

    <!-- 背景 -->
    <div
        class="background-grid"
        aria-hidden="true"
    ></div>

    <!-- 電卓全体 -->
    <main
        class="calculator"
        aria-label="ユウカの電卓"
    >

        <!-- 上側の銀フレーム -->
        <div
            class="silver-frame silver-frame-top"
            aria-hidden="true"
        >
            <div class="silver-frame-body"></div>
            <div class="silver-frame-highlight"></div>
            <div class="frame-light frame-light-top"></div>
        </div>

        <!-- 電卓本体 -->
        <section class="calculator-panel">

            <!-- 左上の白丸 -->
            <div
                class="white-circle white-circle-top"
                aria-hidden="true"
            ></div>

            <!-- 右上の水色パーツ -->
            <div
                class="cyan-module"
                aria-hidden="true"
            >
                <div class="cyan-module-highlight"></div>
            </div>

            <!-- 計算表示 -->
            <header class="display-area">

                <div
                    id="display"
                    class="display-value"
                    aria-live="polite"
                    aria-atomic="true"
                >
                    0
                </div>

            </header>

            <!-- 上部の銀ボタン -->
            <div
                class="utility-buttons"
                aria-label="補助操作"
            >

                <button
                    class="utility-key utility-clear"
                    type="button"
                    data-action="clear"
                    aria-label="クリア"
                >
                    <span>C</span>
                </button>

                <button
                    class="utility-key utility-backspace"
                    type="button"
                    data-action="backspace"
                    aria-label="一文字削除"
                >
                    <span>⌫</span>
                </button>

                <button
                    class="utility-key utility-percent"
                    type="button"
                    data-action="percent"
                    aria-label="パーセント"
                >
                    <span>%</span>
                </button>

                <button
                    class="utility-key utility-sign"
                    type="button"
                    data-action="sign"
                    aria-label="正負切り替え"
                >
                    <span>±</span>
                </button>

            </div>

            <!-- 数字ボタン -->
            <div
                class="number-cluster"
                aria-label="数字入力"
            >

                <button
                    class="number-key number-1"
                    type="button"
                    data-number="1"
                    aria-label="1"
                >
                    <span>1</span>
                </button>

                <button
                    class="number-key number-2"
                    type="button"
                    data-number="2"
                    aria-label="2"
                >
                    <span>2</span>
                </button>

                <button
                    class="number-key number-3"
                    type="button"
                    data-number="3"
                    aria-label="3"
                >
                    <span>3</span>
                </button>

                <button
                    class="number-key number-4"
                    type="button"
                    data-number="4"
                    aria-label="4"
                >
                    <span>4</span>
                </button>

                <button
                    class="number-key number-5"
                    type="button"
                    data-number="5"
                    aria-label="5"
                >
                    <span>5</span>
                </button>

                <button
                    class="number-key number-6"
                    type="button"
                    data-number="6"
                    aria-label="6"
                >
                    <span>6</span>
                </button>

                <button
                    class="number-key number-7"
                    type="button"
                    data-number="7"
                    aria-label="7"
                >
                    <span>7</span>
                </button>

                <button
                    class="number-key number-8"
                    type="button"
                    data-number="8"
                    aria-label="8"
                >
                    <span>8</span>
                </button>

                <button
                    class="number-key number-9"
                    type="button"
                    data-number="9"
                    aria-label="9"
                >
                    <span>9</span>
                </button>

            </div>

            <!-- 演算ボタン
                 配置はCSS側で、手描き図どおりに固定 -->
            <div
                class="operator-cluster"
                aria-label="演算操作"
            >

                <button
                    class="operator-key operator-plus"
                    type="button"
                    data-action="operator"
                    data-value="+"
                    aria-label="足し算"
                >
                    <span>＋</span>
                </button>

                <button
                    class="operator-key operator-minus"
                    type="button"
                    data-action="operator"
                    data-value="-"
                    aria-label="引き算"
                >
                    <span>−</span>
                </button>

                <button
                    class="operator-key operator-multiply"
                    type="button"
                    data-action="operator"
                    data-value="*"
                    aria-label="掛け算"
                >
                    <span>×</span>
                </button>

                <button
                    class="operator-key operator-divide"
                    type="button"
                    data-action="operator"
                    data-value="/"
                    aria-label="割り算"
                >
                    <span>÷</span>
                </button>

                <button
                    class="operator-key operator-equal"
                    type="button"
                    data-action="equal"
                    aria-label="計算結果"
                >
                    <span>=</span>
                </button>

                <button
                    class="operator-key operator-decimal"
                    type="button"
                    data-number="."
                    aria-label="小数点"
                >
                    <span>.</span>
                </button>

            </div>

            <!-- 左下の白い0ボタン -->
            <button
                class="zero-key"
                type="button"
                data-number="0"
                aria-label="0"
            >
                <span>0</span>
            </button>

        </section>

        <!-- 下側の銀フレーム -->
        <div
            class="silver-frame silver-frame-bottom"
            aria-hidden="true"
        >
            <div class="silver-frame-body"></div>
            <div class="silver-frame-highlight"></div>
            <div class="frame-light frame-light-bottom"></div>
        </div>

    </main>

    <!-- パーティクル -->
    <canvas
        id="particles"
        aria-hidden="true"
    ></canvas>

    <script src="script.js?v=20260713-layout01"></script>

</body>
</html>
