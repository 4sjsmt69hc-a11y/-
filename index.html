<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>yuuka_no_dentaku</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="background-grid"></div>

<div class="calculator">

    <div class="top-light"></div>

    <div class="display-panel">

        <div class="title">
            yuuka_no_dentaku
        </div>

        <div id="display">
            0
        </div>

    </div>

<div class="control-panel">

    <div class="utility-buttons">
        <button class="utility-key" data-action="clear">C</button>
        <button class="utility-key" data-action="backspace">⌫</button>
        <button class="utility-key" data-action="percent">%</button>
        <button class="utility-key" data-action="sign">±</button>
    </div>

    <div class="number-area">

        <div class="number-pad">
            <button class="ring-key key-1" data-number="1">1</button>

            <button class="ring-key key-2" data-number="2">2</button>
            <button class="ring-key key-3" data-number="3">3</button>

            <button class="ring-key key-4" data-number="4">4</button>
            <button class="ring-key key-5" data-number="5">5</button>
            <button class="ring-key key-6" data-number="6">6</button>

            <button class="ring-key key-7" data-number="7">7</button>
            <button class="ring-key key-8" data-number="8">8</button>

            <button class="ring-key key-9" data-number="9">9</button>
        </div>

        <button
            class="zero-key"
            data-number="0"
            aria-label="0"
        >
            0
        </button>

    </div>

    <div class="operator-pad">
        <button
            class="mini-key"
            data-action="operator"
            data-value="/"
        >
            ÷
        </button>

        <button
            class="mini-key"
            data-action="operator"
            data-value="*"
        >
            ×
        </button>

        <button
            class="mini-key"
            data-action="operator"
            data-value="-"
        >
            −
        </button>

        <button
            class="mini-key"
            data-action="operator"
            data-value="+"
        >
            ＋
        </button>

        <button
            class="mini-key"
            data-number="."
        >
            .
        </button>

        <button
            class="mini-key equal"
            data-action="equal"
        >
            =
        </button>
    </div>

</div>
    <div class="operator-pad">
        <button class="mini-key" data-action="operator" data-value="/">÷</button>
        <button class="mini-key" data-action="operator" data-value="*">×</button>
        <button class="mini-key" data-action="operator" data-value="-">−</button>

        <button class="mini-key" data-action="operator" data-value="+">＋</button>
        <button class="mini-key" data-number=".">.</button>
        <button class="mini-key equal" data-action="equal">=</button>
    </div>

</div>
    <div class="operator-pad">
        <button class="mini-key" data-action="operator" data-value="/">÷</button>
        <button class="mini-key" data-action="operator" data-value="*">×</button>
        <button class="mini-key" data-action="operator" data-value="-">−</button>

        <button class="mini-key" data-action="operator" data-value="+">＋</button>
        <button class="mini-key decimal-key" data-number=".">.</button>
        <button class="mini-key equal" data-action="equal">=</button>
    </div>

</div>

</div>

<canvas id="particles"></canvas>

<script src="script.js"></script>

</body>
</html>
