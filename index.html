<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="theme-color"
        content="#061626"
    >

    <title>Yuuka Calculator</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="style.css?v=20260712-v5"
    >
</head>

<body>

    <div
        class="background-grid"
        aria-hidden="true"
    ></div>

    <main class="calculator">

        <!-- 上側の銀フレーム -->
        <div
            class="frame frame-top"
            aria-hidden="true"
        >
            <div class="frame-light"></div>
        </div>

        <!-- 電卓本体 -->
        <section
            class="body-panel"
            aria-label="ユウカの電卓"
        >

            <!-- 左上の白い装飾 -->
            <div
                class="white-dot"
                aria-hidden="true"
            ></div>

            <!-- 右上の水色装飾 -->
            <div
                class="cyan-corner"
                aria-hidden="true"
            ></div>

            <!-- 計算表示 -->
            <header class="display">
                <div
                    id="display"
                    aria-live="polite"
                    aria-atomic="true"
                >
                    0
                </div>
            </header>

            <!-- 上部の銀ボタン -->
            <div
                class="utility-buttons"
                aria-label="補助操作"
            >
                <button
                    class="utility-key utility-clear"
                    type="button"
                    data-action="clear"
                    aria-label="クリア"
                >
                    C
                </button>

                <button
                    class="utility-key utility-backspace"
                    type="button"
                    data-action="backspace"
                    aria-label="一文字削除"
                >
                    ⌫
                </button>

                <button
                    class="utility-key utility-percent"
                    type="button"
                    data-action="percent"
                    aria-label="パーセント"
                >
                    %
                </button>

                <button
                    class="utility-key utility-sign"
                    type="button"
                    data-action="sign"
                    aria-label="正負切り替え"
                >
                    ±
                </button>
            </div>

            <!-- 数字ボタン -->
            <div
                class="number-area"
                aria-label="数字入力"
            >
                <button
                    class="number-key n1"
                    type="button"
                    data-number="1"
                    aria-label="1"
                >
                    1
                </button>

                <button
                    class="number-key n2"
                    type="button"
                    data-number="2"
                    aria-label="2"
                >
                    2
                </button>

                <button
                    class="number-key n3"
                    type="button"
                    data-number="3"
                    aria-label="3"
                >
                    3
                </button>

                <button
                    class="number-key n4"
                    type="button"
                    data-number="4"
                    aria-label="4"
                >
                    4
                </button>

                <button
                    class="number-key n5"
                    type="button"
                    data-number="5"
                    aria-label="5"
                >
                    5
                </button>

                <button
                    class="number-key n6"
                    type="button"
                    data-number="6"
                    aria-label="6"
                >
                    6
                </button>

                <button
                    class="number-key n7"
                    type="button"
                    data-number="7"
                    aria-label="7"
                >
                    7
                </button>

                <button
                    class="number-key n8"
                    type="button"
                    data-number="8"
                    aria-label="8"
                >
                    8
                </button>

                <button
                    class="number-key n9"
                    type="button"
                    data-number="9"
                    aria-label="9"
                >
                    9
                </button>
            </div>

            <!-- 0ボタン -->
            <button
                class="zero-key"
                type="button"
                data-number="0"
                aria-label="0"
            >
                0
            </button>

            <!-- 演算ボタン -->
            <div
                class="operator-area"
                aria-label="演算操作"
            >
                <button
                    class="operator-key divide"
                    type="button"
                    data-action="operator"
                    data-value="/"
                    aria-label="割り算"
                >
                    ÷
                </button>

                <button
                    class="operator-key multiply"
                    type="button"
                    data-action="operator"
                    data-value="*"
                    aria-label="掛け算"
                >
                    ×
                </button>

                <button
                    class="operator-key minus"
                    type="button"
                    data-action="operator"
                    data-value="-"
                    aria-label="引き算"
                >
                    −
                </button>

                <button
                    class="operator-key plus"
                    type="button"
                    data-action="operator"
                    data-value="+"
                    aria-label="足し算"
                >
                    ＋
                </button>

                <button
                    class="operator-key decimal"
                    type="button"
                    data-number="."
                    aria-label="小数点"
                >
                    .
                </button>

                <button
                    class="operator-key equal"
                    type="button"
                    data-action="equal"
                    aria-label="計算結果"
                >
                    =
                </button>
            </div>

        </section>

        <!-- 下側の銀フレーム -->
        <div
            class="frame frame-bottom"
            aria-hidden="true"
        >
            <div class="frame-light"></div>
        </div>

    </main>

    <canvas
        id="particles"
        aria-hidden="true"
    ></canvas>

    <script src="script.js?v=20260712-v5"></script>

</body>
</html>
