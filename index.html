<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<meta
    name="theme-color"
    content="#061626"
>

<title>Yuuka Calculator</title>

<link
    rel="preconnect"
    href="https://fonts.googleapis.com"
>

<link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
>

<link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap"
    rel="stylesheet"
>

<link
    rel="stylesheet"
    href="style.css?v=6"
>

</head>

<body>

<div class="background-grid"></div>

<main class="calculator">

    <div class="frame frame-top">
        <div class="frame-light"></div>
    </div>

    <section class="body-panel">

        <div class="white-dot"></div>

        <div class="cyan-corner"></div>

        <!-- ===================== -->
        <!-- 表示部 -->
        <!-- ===================== -->

        <div class="display-wrap">

            <header class="display">

                <div
                    id="display"
                    aria-live="polite"
                    aria-atomic="true"
                >
                    0
                </div>

            </header>

        </div>

        <!-- ===================== -->
        <!-- 銀ボタン -->
        <!-- ===================== -->

        <div class="utility-wrap">

            <div class="utility-buttons">

                <button
                    class="utility-key utility-clear"
                    data-action="clear"
                >
                    C
                </button>

                <button
                    class="utility-key utility-backspace"
                    data-action="backspace"
                >
                    ⌫
                </button>

                <button
                    class="utility-key utility-percent"
                    data-action="percent"
                >
                    %
                </button>

                <button
                    class="utility-key utility-sign"
                    data-action="sign"
                >
                    ±
                </button>

            </div>

        </div>

        <!-- ===================== -->
        <!-- 数字 -->
        <!-- ===================== -->

        <div class="number-wrap">

            <div class="number-area">

                <button class="number-key n1" data-number="1">1</button>
                <button class="number-key n2" data-number="2">2</button>
                <button class="number-key n3" data-number="3">3</button>

                <button class="number-key n4" data-number="4">4</button>
                <button class="number-key n5" data-number="5">5</button>
                <button class="number-key n6" data-number="6">6</button>

                <button class="number-key n7" data-number="7">7</button>
                <button class="number-key n8" data-number="8">8</button>
                <button class="number-key n9" data-number="9">9</button>

            </div>

        </div>

        <!-- ===================== -->
        <!-- 0 -->
        <!-- ===================== -->

        <button
            class="zero-key"
            data-number="0"
        >
            0
        </button>

        <!-- ===================== -->
        <!-- 演算 -->
        <!-- ===================== -->

        <div class="operator-area">

            <button
                class="operator-key divide"
                data-action="operator"
                data-value="/"
            >
                ÷
            </button>

            <button
                class="operator-key multiply"
                data-action="operator"
                data-value="*"
            >
                ×
            </button>

            <button
                class="operator-key minus"
                data-action="operator"
                data-value="-"
            >
                −
            </button>

            <button
                class="operator-key plus"
                data-action="operator"
                data-value="+"
            >
                ＋
            </button>

            <button
                class="operator-key decimal"
                data-number="."
            >
                .
            </button>

            <button
                class="operator-key equal"
                data-action="equal"
            >
                =
            </button>

        </div>

    </section>

    <div class="frame frame-bottom">
        <div class="frame-light"></div>
    </div>

</main>

<canvas id="particles"></canvas>

<script src="script.js?v=6"></script>

</body>
</html>
